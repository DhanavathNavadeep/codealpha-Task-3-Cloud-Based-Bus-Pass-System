version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bus_pass_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://buspass_user:buspass_pass@db:5432/buspass_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-production-buspass-key
      - JWT_SECRET_KEY=jwt-secret-key-bus-pass-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bus_pass_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  db:
    image: postgres:15-alpine
    container_name: bus_pass_db
    environment:
      POSTGRES_DB: buspass_db
      POSTGRES_USER: buspass_user
      POSTGRES_PASSWORD: buspass_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buspass_user -d buspass_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: bus_pass_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
